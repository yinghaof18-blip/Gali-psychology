<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 My Emotional Space Simulator</title>
    <style>
        /* 全局样式：温暖护眼的浅绿色背景 */
        body {
            background-color: #e8f5e9; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 游戏化互动卡片 */
        .quiz-container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(46, 125, 50, 0.1);
            width: 100%;
            max-width: 650px;
            padding: 35px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* 顶部装饰条 */
        .top-bar {
            height: 6px;
            background: linear-gradient(90deg, #4caf50, #81c784);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }

        /* 角色故事场景区域 */
        .character-scenery {
            text-align: center;
            background-color: #f1f8e9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #a5d6a7;
        }

        .avatar {
            font-size: 50px; /* 控制小图标尺寸，防止分散注意力 */
            margin-bottom: 8px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .story-text {
            font-size: 15px;
            line-height: 1.6;
            color: #37474f;
            font-style: italic;
        }

        .question-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 20px;
        }

        /* 交互式对话/行为选项 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 15px;
            background-color: #fff;
        }

        .option-card:hover {
            transform: translateY(-2px);
            border-color: #81c784;
            background-color: #f1f8e9;
        }

        .option-card input {
            margin-right: 15px;
            transform: scale(1.3);
        }

        .option-card.selected {
            background-color: #e8f5e9;
            border-color: #4caf50;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.15);
        }

        /* 积极心理学反馈盒 */
        .feedback-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-box.positive {
            display: block;
            background-color: #e8f5e9;
            border-left: 6px solid #4caf50;
            color: #1b5e20;
        }

        .feedback-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 经典底部标准导航按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back {
            background-color: #cfd8dc;
            color: #37474f;
        }

        .btn-back:hover { background-color: #b0bec5; }
        .btn-back:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-next {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 3px 6px rgba(76, 175, 80, 0.2);
        }

        .btn-next:hover { background-color: #43a047; }

        /* 结业证书页面样式 */
        .result-view {
            text-align: center;
            padding: 20px 10px;
        }
        .medal {
            font-size: 70px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="top-bar"></div>

    <div id="quiz-view">
        <div class="character-scenery">
            <div class="avatar" id="char-avatar">👦</div>
            <div class="story-text" id="char-story">Loading scenario...</div>
        </div>

        <div class="question-title" id="question-text">Loading question...</div>
        
        <div class="options-container" id="options-container">
            </div>

        <div class="feedback-box" id="feedback-box"></div>

        <div class="nav-buttons">
            <button class="btn-back" id="btn-back" onclick="goBack()" disabled>Back</button>
            <button class="btn-next" id="btn-next" onclick="handleNext()">Submit</button>
        </div>
    </div>

    <div id="result-view" class="result-view" style="display: none;">
        <div class="medal">🏆</div>
        <h2>Mindfulness & Growth Completed!</h2>
        <p style="line-height: 1.7; font-size: 16px; color: #455a64;">
            You have explored the inner worlds of <b>Lily, Tom, and Sam</b>. By choosing empathy, growth mindsets, and smart coping skills, you've unlocked the power to transform academic stress into emotional strength! 💚
        </p>
        <button class="btn-next" onclick="restartQuiz()" style="margin-top: 25px;">Explore Again</button>
    </div>
</div>

<script>
    // 融入积极心理学（Positive Psychology）的儿童特定案例库
    const quizData = [
        {
            char: "👧",
            story: "Meet Lily. Every Sunday night, her stomach feels tight and hurts, but the doctor says her body is completely healthy. She is terrified of the upcoming school week.",
            question: "What is Lily's inner self trying to tell us through her tummy ache?",
            options: [
                "A) 🍽️ She is just digesting her dinner slowly.", 
                "B) 🌧️ Her body is speaking for her mind—she is carrying heavy school anxiety.", 
                "C) 🎒 She wants to stay home to play with toys."
            ],
            correct: 1,
            // 无论对错，都给予成长型、安抚性的积极心理学反馈
            feedbacks: [
                "💡 Mindful Shift: While it looks like a digestion issue, Lily's body is actually sound. Let's look closer at her feelings!",
                "❤️ Positive Resonance: Absolutely! In positive psychology, we call this 'somatic expression.' Lily's stress is so heavy that her body is trying to share the load. Recognizing this allows us to wrap her in safety, teaching her that her fears are real, valid, and safe to talk about.",
                "💡 Mindful Shift: Skipping school might seem like the goal, but the pain is real to Lily. Let's explore how stress lives in our bodies!"
            ]
        },
        {
            char: "👦",
            story: "Meet Tom. He worked hard on his math task but got a low score. He dropped his head, tears filling his eyes, and whispered: 'I am just stupid. I can't do anything right.'",
            question: "If you want to spark a 'Growth Mindset' in Tom, how should we reply?",
            options: [
                "A) 🚫 'Don't worry, Tom! Grades are not important at all anyway.'", 
                "B) 📈 'If you just study twice as hard next time, you will get an A!'", 
                "C)  🌱 'I see you're disappointed, Tom. But a low score isn't a permanent stamp; it's just a map showing us where your brain is ready to grow next!'"
            ],
            correct: 2,
            feedbacks: [
                "💡 Mindful Shift: Saying it doesn't matter might accidentally minimize Tom's hard work. Let's find a way to honor his effort!",
                "💡 Mindful Shift: Simply forcing him to 'study harder' can add pressure and make him feel like his current effort wasn't enough. Let's focus on the process instead.",
                "✨ Positive Resonance: Brilliant! This is the core of Growth Mindset. You recognized his sadness (Validation) and immediately decoupled his self-worth from a single piece of paper. Mistakes aren't stop signs; they are data points for our brains to sprout!"
            ]
        },
        {
            char: "🧘‍♂️",
            story: "Meet Sam. He has a massive pile of homework due tomorrow. He feels paralyzed, dizzy, and is starting to throw his pencils in frustration because it feels 'impossible'.",
            question: "What is the best positive psychological coping tool to reset Sam's nervous system?",
            options: [
                "A) ⏳ 'Take a 5-minute deep-breath break, then let's conquer just the first 3 problems together.'", 
                "B) ⏰ 'Keep pushing through! The faster you finish, the faster the stress will go away.'", 
                "C) 🎮 'Put it all away and play video games for the rest of the night to forget it.'"
            ],
            correct: 0,
            feedbacks: [
                "🌿 Positive Resonance: Magnificient! When kids enter 'fight-or-flight' (throwing pencils), their thinking brains shut down. Short 'brain breaks' reset the nervous system, and chunking tasks into tiny steps removes the overwhelming mountain, replacing it with an achievable path.",
                "💡 Mindful Shift: Pushing through a panicked state usually leads to more tears and cognitive fatigue. Let's help Sam calm his nervous system first.",
                "💡 Mindful Shift: Escaping completely might relieve stress for an hour, but tomorrow the mountain will be bigger. Let's teach Sam how to gently face it instead."
            ]
        }
    ];

    let currentIdx = 0;
    let userChoices = new Array(quizData.length).fill(null);
    let submitted = false;

    loadStep();

    function loadStep() {
        submitted = false;
        const data = quizData[currentIdx];
        
        // 渲染故事与表情
        document.getElementById('char-avatar').innerText = data.char;
        document.getElementById('char-story').innerText = data.story;
        document.getElementById('question-text').innerText = data.question;
        
        // 控制导航按钮状态
        document.getElementById('btn-back').disabled = currentIdx === 0;
        
        // 渲染选项
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        data.options.forEach((opt, index) => {
            const card = document.createElement('div');
            card.className = `option-card ${userChoices[currentIdx] === index ? 'selected' : ''}`;
            card.onclick = () => selectCard(index);
            
            card.innerHTML = `
                <input type="radio" name="opts" value="${index}" ${userChoices[currentIdx] === index ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
                <span>${opt}</span>
            `;
            container.appendChild(card);
        });

        // 重置反馈和提交状态
        const fb = document.getElementById('feedback-box');
        fb.style.display = 'none';
        document.getElementById('btn-next').innerText = "Submit Choice";
    }

    function selectCard(index) {
        if (submitted) return;
        userChoices[currentIdx] = index;
        
        const cards = document.querySelectorAll('.option-card');
        cards.forEach((c, idx) => {
            if(idx === index) {
                c.classList.add('selected');
                c.querySelector('input').checked = true;
            } else {
                c.classList.remove('selected');
            }
        });
    }

    function handleNext() {
        const choice = userChoices[currentIdx];
        if (choice === null) {
            alert("Please pick an action card first! 😊");
            return;
        }

        const data = quizData[currentIdx];
        const fb = document.getElementById('feedback-box');

        // 第一步：点击提交按钮，触发积极心理学评估与孩子反应反馈
        if (!submitted) {
            submitted = true;
            
            // 锁定所有选择
            document.querySelectorAll('input[name="opts"]').forEach(i => i.disabled = true);
            
            // 展示特定选项所对应的儿童情绪反应和心理学引导
            fb.className = "feedback-box positive";
            if (choice === data.correct) {
                fb.innerHTML = `<div class="feedback-title">🌈 Perfect Choice!</div>${data.feedbacks[choice]}`;
                fb.style.borderLeftColor = "#4caf50";
                fb.style.backgroundColor = "#e8f5e9";
                fb.style.color = "#1b5e20";
            } else {
                fb.innerHTML = `<div class="feedback-title">🧡 Learning Moment!</div>${data.feedbacks[choice]}`;
                fb.style.borderLeftColor = "#ff9800";
                fb.style.backgroundColor = "#fff3e0";
                fb.style.color = "#e65100";
            }
            
            document.getElementById('btn-next').innerText = (currentIdx === quizData.length - 1) ? "See Summary" : "Next Child ➡️";
            return;
        }

        // 第二步：再次点击进入下一题或结算
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            loadStep();
        } else {
            showFinal();
        }
    }

    function goBack() {
        if (currentIdx > 0) {
            currentIdx--;
            loadStep();
        }
    }

    function showFinal() {
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
    }

    function restartQuiz() {
        currentIdx = 0;
        userChoices = new Array(quizData.length).fill(null);
        document.getElementById('quiz-view').style.display = 'block';
        document.getElementById('result-view').style.display = 'none';
        loadStep();
    }
</script>

</body>
</html>
